name: Deploy Food Business Demo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    env:
      SERVER_PATH: /var/www/food-business-demo   # ✅ SET YOUR PATH HERE

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          npm install

      - name: Build project
        run: |
          npm run build

      - name: Prepare Server Directory
        run: |
          echo "Deploying to: $SERVER_PATH"

          # Check if SERVER_PATH is set
          if [ -z "$SERVER_PATH" ]; then
            echo "ERROR: SERVER_PATH is not set"
            exit 1
          fi

          # Create directory if not exists
          mkdir -p "$SERVER_PATH"

          # Clean only inside target folder (SAFE)
          rm -rf "$SERVER_PATH"/*

      - name: Copy build files
        run: |
          cp -r dist/* "$SERVER_PATH"/

      - name: Restart NGINX
        run: |
          sudo systemctl restart nginx
