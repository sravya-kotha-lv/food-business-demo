name: Food Business Demo CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Install dependencies
      - name: Install Dependencies
        run: npm install

      # 4️⃣ Build project
      - name: Build Project
        run: npm run build

      # 5️⃣ Ensure deployment directory exists + clean safely
      - name: Prepare Server Directory
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Deploying to: ${{ secrets.SERVER_PATH }}"

            # Stop if path is empty
            if [ -z "${{ secrets.SERVER_PATH }}" ]; then
              echo "ERROR: SERVER_PATH is not set"
              exit 1
            fi

            # Create directory if not exists
            mkdir -p "${{ secrets.SERVER_PATH }}"

            # Clean old files (SAFE)
            rm -rf "${{ secrets.SERVER_PATH }}"/*

      # 6️⃣ Upload build files to server
      - name: Upload Files to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/*"
          target: ${{ secrets.SERVER_PATH }}

      # 7️⃣ Restart NGINX
      - name: Restart NGINX
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            sudo systemctl restart nginx

      # 8️⃣ Success message
      - name: Deployment Complete
        run: echo "Food Business Demo Deployed Successfully "
